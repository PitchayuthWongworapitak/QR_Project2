<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
            background: #f5f5f5;
        }

        .card {
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .15);
        }

        #code {
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 6px;
            color: #1e88e5;
            margin: 30px 0;
        }

        #status {
            font-size: 24px;
            color: orange;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        button {
            margin-top: 25px;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
        }

        #switchPage {
            position: fixed;
            top: 15px;
            right: 15px;

            padding: 10px 15px;

            border: none;
            border-radius: 8px;

            cursor: pointer;

            background: #1976d2;
            color: white;
        }

        #switchPage:hover {
            background: #1565c0;
        }
    </style>
</head>

<body>
    <button id="switchPage" onclick="location.href='/phone.html'">
        Sender >
    </button>

    <div class="card">

        <h1>Prototype Machine</h1>

        <p>Enter this string on another device.</p>

        <div id="qrcode"></div>

        <div>
            <input type="tel" id="phoneNo" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" placeholder="Phone Number">
            <input type="number" step=".01" id="amount" placeholder="Amount">
        </div>


        <div id="sender"></div>

        <button onclick="generateCode()">
            Generate QR
        </button>



    </div>
    <script>
        // Sample String 1: 00020101021129370016A0000006770101110113006664653364253037645406150.005802TH630498F1
        // Sample String 2: 00 02 01 01 02 11 29 37 0016A00000067701011101130066646533642 53 03 764 54 06 500.00 58 02 TH 63 04 2D6D

        let currentCode = "";

        async function generateCode() {
            const phoneNo = "66" + document.getElementById("phoneNo").value.trim().substring(1, 10);
            const amount = document.getElementById("amount").value.trim();
            currentCode = `00020101021129370016A000000677010111011300${phoneNo}53037645406${amount}5802TH6304`;
            const response = await fetch("api/create", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                }, 
                body: JSON.stringify({ string: currentCode })
            });
            const data = await response.json();

            currentCode = data.code;

            //document.getElementById("status").textContent = "Waiting...";
            //document.getElementById("sender").textContent = "";

            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = ""; // Clear previous QR code

            console.log(`Generated QR Code URL: ${currentCode}`);

            new QRCode(qrContainer, {
                text: currentCode,
                width: 200,
                height: 200,
                align: "center"
            });
        }

        async function checkStatus() {
            console.log(`Checking status for code...`);
            if (currentCode === "") return;
            const response = await fetch("api/status/" + currentCode);
            const data = await response.json();

            console.log(data);

            if (data.matched) {
                document.getElementById("status").textContent = "Matched!";
                if (data.name) {
                    document.getElementById("sender").textContent = `Submitted by: ${data.name}`;
                }
            }
        }
        // setInterval(checkStatus, 1000);

    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>


</body>

</html>
