<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
            background: #f5f5f5;
        }

        .card {
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .15);
        }

        #code {
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 6px;
            color: #1e88e5;
            margin: 30px 0;
        }

        #status {
            font-size: 24px;
            color: orange;
        }

        button {
            margin-top: 25px;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
        }

        #switchPage {
            position: fixed;
            top: 15px;
            right: 15px;

            padding: 10px 15px;

            border: none;
            border-radius: 8px;

            cursor: pointer;

            background: #1976d2;
            color: white;
        }

        #switchPage:hover {
            background: #1565c0;
        }
    </style>
</head>

<body>
    <button id="switchPage" onclick="location.href='/phone.html'">
        Sender >
    </button>

    <div class="card">

        <h1>Prototype Machine</h1>

        <p>Enter this string on another device.</p>

        <div id="code">------</div>

        <div id="qrcode"></div>

        <div id="status">Waiting...</div>

        <div id="sender"></div>

        <button onclick="generateCode()">
            Generate New String
        </button>

    </div>

    <script>

        let currentCode = "";

        async function generateCode() {
            const response = await fetch("api/create");
            const data = await response.json();
            currentCode = data.code;
            document.getElementById("code").textContent = currentCode;
            document.getElementById("status").textContent = "Waiting...";
            document.getElementById("sender").textContent = "";

            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = ""; // Clear previous QR code

            const qrURL = window.location.origin + "/phone.html?code=" + encodeURIComponent(currentCode);

            new QRCode(qrContainer, {
                text: qrURL,
                width: 200,
                height: 200
            });
        }

        async function checkStatus() {
            console.log(`Checking status for code...`);
            if (currentCode === "") return;
            const response = await fetch("api/status/" + currentCode);
            const data = await response.json();

            console.log(data);

            if (data.matched) {
                document.getElementById("status").textContent = "Matched!";
                if (data.name) {
                    document.getElementById("sender").textContent = `Submitted by: ${data.name}`;
                }
            }
        }
        setInterval(checkStatus, 1000);

        generateCode();

    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</body>

</html>
