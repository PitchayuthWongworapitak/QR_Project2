<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            margin-top: 80px;
        }

        .card {
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .15);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            font-size: 20px;
            text-align: center;
            box-sizing: border-box;
            margin: 20px 0;
            text-transform: uppercase;
        }

        button {
            margin-top: 25px;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
        }

        #switchPage {
            position: fixed;
            top: 15px;
            right: 15px;

            padding: 10px 15px;

            border: none;
            border-radius: 8px;

            cursor: pointer;

            background: #1976d2;
            color: white;
        }

        #switchPage:hover {
            background: #1565c0;
        }
    </style>
</head>

<body>
    <button id="switchPage" onclick="location.href='/'">
        < Receiver
    </button>

    <div class="card">

        <h1>Phone</h1>

        <p>Enter the string shown on the machine.</p>

        <input id="code" type="text" maxlength="6" placeholder="ABC123">
        <input id="senderName" type="text" maxlength="50" placeholder="Your Name">

        <button onclick="submitCode()">
            Submit
        </button>

        <div id="result"></div>

    </div>

    <script>

        async function submitCode() {

            const code = document
                .getElementById("code")
                .value
                .trim()
                .toUpperCase();

            const name = document
                .getElementById("senderName")
                .value.trim();

            const response = await fetch("api/submit", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ code: code, name: name })
            });

            const data = await response.json();
            document.getElementById("result").textContent = data.success ? "Matched!" : "Invalid Code";

        }

        const params = new URLSearchParams(window.location.search);

        const code = params.get("code");

        if (code) {
            document.getElementById("code").value = code;
        }

    </script>

</body>

</html>
